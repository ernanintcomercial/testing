<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acompanhamento de Pedidos - Wetzel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --border: #333333; --text: #ffffff; --text-faint: #6b6b6b; --accent: #e3000f; --red-hi: #e3000f; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 30px; font-size: 13px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* CARDS */
        .summary-cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; flex: 1; }
        .card-title { font-size: 11px; color: var(--text-faint); text-transform: uppercase; margin-bottom: 8px; }
        .card-value { font-size: 24px; font-weight: 700; }
        .critical { color: var(--accent); }

        /* TABELA */
        .tree-header { margin-bottom: 20px; }
        .node-row { display: flex; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; }
        .node-row:hover { background: var(--surface); }
        .col-main { flex: 2; } .col-val, .col-qtd, .col-dias { flex: 1; text-align: right; }
        .children { display: none; padding-left: 20px; background: #161616; }
        .open > .children { display: block; }
        .dias-chip { padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .itens-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .itens-table th { color: var(--text-faint); text-align: left; padding: 8px; }
        .itens-table td { padding: 8px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <h1>Acompanhamento de Pedidos</h1>
    
    <!-- Cards que o seu JS vai preencher -->
    <div class="summary-cards" id="kpis">
        <div class="card"><div class="card-title">TOTAL ATRASADO</div><div class="card-value" id="val-total">R$ 0</div></div>
        <div class="card"><div class="card-title">QTD PEDIDOS</div><div class="card-value" id="val-qtd">0</div></div>
        <div class="card"><div class="card-title">CRÍTICOS (70+ DIAS)</div><div class="card-value critical" id="val-crit">0</div></div>
        <div class="card"><div class="card-title">ATRASO MÁXIMO</div><div class="card-value" id="val-max">0 dias</div></div>
    </div>

    <div style="margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Buscar..." style="padding:8px; width:300px;">
        <button id="expandAll">Expandir tudo</button>
        <button id="collapseAll">Recolher tudo</button>
    </div>

    <div class="tree" id="tree"></div>
</div>

<script>
const GITHUB_USER = "ernanintcomercial", GITHUB_REPO = "testing", GITHUB_BRANCH = "main";
const FILE_DADOS = "dados_brutos.xlsx", FILE_INDEX = "INDEX.xlsx", FILE_PRIORITARIOS = "Clientes Prioritarios.xlsx";

async function loadDataFromGithub() {
    try {
        const fetchExcel = async (f) => {
            const r = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${f}?t=${Date.now()}`);
            const b = await r.arrayBuffer();
            return XLSX.utils.sheet_to_json(XLSX.read(b, {type: 'array'}).Sheets[XLSX.read(b, {type: 'array'}).SheetNames[0]], {header: 1});
        };
        const [rawDados, rawIndex, rawPrio] = await Promise.all([fetchExcel(FILE_DADOS), fetchExcel(FILE_INDEX), fetchExcel(FILE_PRIORITARIOS)]);
        
        // ... (Aqui entra a lógica de processamento que você já tinha)
        // Como o espaço é limitado, certifique-se que após carregar os dados, você chame:
        // renderKPIs(generatedTree);
        // renderTree(generatedTree);
    } catch(e) { document.getElementById('tree').innerText = "Erro ao carregar arquivos."; }
}

function renderKPIs(data) {
   let totalRS = 0, totalPeds = 0, pedsCriticos = 0, maxDiasGlobal = 0;
   function traverse(n) {
       if (n.level === 'pedido') {
           totalRS += n.valor; totalPeds++;
           if (n.diasMax >= 70) pedsCriticos++;
           if (n.diasMax > maxDiasGlobal) maxDiasGlobal = n.diasMax;
       } else if(n.children) n.children.forEach(traverse);
   }
   data.forEach(traverse);
   document.getElementById('val-total').innerText = totalRS.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
   document.getElementById('val-qtd').innerText = totalPeds;
   document.getElementById('val-crit').innerText = pedsCriticos;
   document.getElementById('val-max').innerText = maxDiasGlobal + " dias";
}

document.addEventListener("DOMContentLoaded", loadDataFromGithub);
// ... (mantenha o restante das suas funções toggle, renderTree, etc aqui)
</script>
</body>
</html>
